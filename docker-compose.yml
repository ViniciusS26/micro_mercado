version: '3.8'

services:
  # Base de Dados para cada serviço
  db_funcionarios:
    image: postgres:14-alpine
    volumes:
      - postgres_funcionarios:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=vini123
      - POSTGRES_DB=funcionarios_db
    ports:
      - "5436:5432"

  # Microsserviços FastAPI
  ms_funcionarios:
    build:
      context: ./services/ms-funcionarios
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./services/ms-funcionarios/app:/app
    ports:
      - "8001:8001"
    depends_on:
      - db_funcionarios
    environment:
      - DATABASE_URL=postgresql://postgres:vini123@db_funcionarios/funcionarios_db

  db_produtos:
    image: postgres:14-alpine
    volumes:
      - postgres_produtos:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=produtos_db
    ports:
      - "5433:5432"

  ms_produtos:
    build:
      context: ./services/ms-produtos
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    volumes:
      - ./services/ms-produtos/app:/app
    ports:
      - "8002:8002"
    depends_on:
      - db_produtos
    environment:
      - DATABASE_URL=postgresql://user:password@db_produtos/produtos_db

  db_vendas:
    image: postgres:14-alpine
    volumes:
      - postgres_vendas:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=vini123
      - POSTGRES_DB=vendas_db
    ports:
      - "5434:5432"

  ms_vendas:
    build:
      context: ./services/ms-vendas
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8004 --reload
    volumes:
      - ./services/ms-vendas/app:/app
    ports:
      - "8004:8004"
    depends_on:
      - db_vendas
    environment:
      - DATABASE_URL=postgresql://postgres:vini123@db_vendas/vendas_db

  db_relatorios:
    image: postgres:14-alpine
    volumes:
      - postgres_relatorios:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=vini123
      - POSTGRES_DB=relatorios_db
    ports:
      - "5435:5432"

  ms_relatorios:
    build:
      context: ./services/ms-relatorios
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload
    volumes:
      - ./services/ms-relatorios/app:/app
    ports:
      - "8003:8003"
    depends_on:
      - db_relatorios

  # API Gateway (FastAPI)
  api_gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./api-gateway/app:/app
    environment:
      - MS_FUNCIONARIOS_URL=http://ms_funcionarios:8001/api/v1/funcionarios
      - MS_PRODUTOS_URL=http://ms_produtos:8002/api/v1/produtos
      - MS_VENDAS_URL=http://ms_vendas:8004/api/v1/vendas
      - MS_RELATORIOS_URL=http://ms_relatorios:8003/v1/relatorios
    depends_on:
      - ms_funcionarios
      - ms_produtos
      - ms_vendas
      - ms_relatorios

  # ------------------------------------------------------------------------
  # NOVO SERVIÇO: BUILD E SERVIÇO DO VUE (Frontend)
  # ------------------------------------------------------------------------
  frontend:
    # Usa o Dockerfile que criamos em ./frontend/Dockerfile
    build:
      context: ./frontend 
      dockerfile: Dockerfile
    container_name: vue_frontend_builder
    # Monta um volume para persistir a pasta 'dist' (o resultado do build)
    # e poder compartilhá-lo com o serviço Nginx.
    volumes:
      - vue_dist_volume:/app/dist
    # Esta linha garante que o build seja executado sempre que o Compose for iniciado
    command: npm run build -- --base /app/ 

  # ------------------------------------------------------------------------
  # NGINX - Reverse Proxy e Servidor de Arquivos Estáticos
  # ------------------------------------------------------------------------
  nginx:
    image: nginx:stable-alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      # Mapeia o arquivo de configuração Nginx modificado
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mapeia o resultado da compilação do Vue (volume 'dist')
      # para o local onde o Nginx espera encontrar os arquivos estáticos (/usr/share/nginx/html)
      - vue_dist_volume:/usr/share/nginx/html/app
    depends_on:
      - api_gateway 
      - vue-frontend # Garante que o build do Vue termine antes do Nginx tentar servir os arquivos
    restart: unless-stopped

volumes:
  postgres_funcionarios:
  postgres_produtos:
  postgres_vendas:
  postgres_relatorios:
  # NOVO VOLUME: Volume para compartilhar o resultado do build do Vue
  vue_dist_volume: